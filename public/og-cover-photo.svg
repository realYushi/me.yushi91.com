<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Yushi Cui — Full-Stack Product Engineer">
  <!-- Photographic OG cover. The AI-generated blueprint portrait supplies the
       ground and the grid texture; type is composited live from the design
       tokens so it stays crisp. Tuned for the DARK portrait variant: light ink
       over a near-black photo, dark-scheme cobalt accent (#6e8cff) for contrast.
       Replace og-portrait.png with the generated image (subject on the right,
       negative space on the left). -->
  <defs>
    <linearGradient id="scrim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#0a0d12" stop-opacity="0.92" />
      <stop offset="0.45" stop-color="#0a0d12" stop-opacity="0.78" />
      <stop offset="0.68" stop-color="#0a0d12" stop-opacity="0.30" />
      <stop offset="1"    stop-color="#0a0d12" stop-opacity="0" />
    </linearGradient>
    <clipPath id="og-mark-card">
      <rect x="1016" y="64" width="120" height="120" rx="26" />
    </clipPath>
  </defs>

  <!-- Generated portrait, cover-fit. -->
  <image href="og-portrait-dark.png" x="0" y="0" width="1200" height="630"
         preserveAspectRatio="xMidYMid slice" />

  <!-- Left scrim: keeps the type legible regardless of what the photo does. -->
  <rect width="1200" height="630" fill="url(#scrim)" />

  <!-- Eyebrow -->
  <text x="80" y="168" font-family="JetBrains Mono" font-size="26" font-weight="500"
        letter-spacing="5.5" fill="#6e8cff">FULL-STACK PRODUCT ENGINEER</text>

  <!-- Headline (Space Grotesk bold, light ink with cobalt accent) -->
  <text x="76" y="320" font-family="Space Grotesk" font-size="96" font-weight="700"
        letter-spacing="-3" fill="#e8ebee">I build products</text>
  <text x="76" y="428" font-family="Space Grotesk" font-size="96" font-weight="700"
        letter-spacing="-3" fill="#6e8cff">end to end<tspan fill="#e8ebee">.</tspan></text>
</svg>
