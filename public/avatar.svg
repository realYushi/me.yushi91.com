<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="Yushi Cui">
  <!-- Cobalt Blueprint monogram. Background is the fixed near-black draft panel
       (dark-band token) so the mark reads identically in every context; the YC
       construction is carried over from the favicon, with the accent moved from
       the off-brand teal to the locked cobalt. -->
  <defs>
    <clipPath id="card">
      <rect width="180" height="180" rx="40" />
    </clipPath>
    <linearGradient id="grid-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000" stop-opacity="0" />
      <stop offset="0.14" stop-color="#000" stop-opacity="1" />
      <stop offset="0.86" stop-color="#000" stop-opacity="1" />
      <stop offset="1" stop-color="#000" stop-opacity="0" />
    </linearGradient>
    <mask id="grid-mask">
      <rect width="180" height="180" fill="url(#grid-fade)" />
    </mask>
  </defs>

  <g clip-path="url(#card)">
    <rect width="180" height="180" fill="#0a0d12" />

    <!-- Signature 12-column blueprint guides (grid-line on the dark band). -->
    <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="0.75" mask="url(#grid-mask)">
      <line x1="15"  y1="0" x2="15"  y2="180" />
      <line x1="30"  y1="0" x2="30"  y2="180" />
      <line x1="45"  y1="0" x2="45"  y2="180" />
      <line x1="60"  y1="0" x2="60"  y2="180" />
      <line x1="75"  y1="0" x2="75"  y2="180" />
      <line x1="90"  y1="0" x2="90"  y2="180" />
      <line x1="105" y1="0" x2="105" y2="180" />
      <line x1="120" y1="0" x2="120" y2="180" />
      <line x1="135" y1="0" x2="135" y2="180" />
      <line x1="150" y1="0" x2="150" y2="180" />
      <line x1="165" y1="0" x2="165" y2="180" />
    </g>

    <!-- Y (ink-on-dark) over C (cobalt accent). -->
    <path d="M39 48h23l28 47 28-47h23l-40 68v28H79v-28L39 48Z" fill="#ffffff" />
    <path d="M124 120c-9 8-20 12-34 12-29 0-52-23-52-52s23-52 52-52c14 0 25 4 34 12l-15 15c-5-5-12-7-19-7-17 0-30 13-30 32s13 32 30 32c8 0 14-2 20-8l14 16Z" fill="#2038e6" />
  </g>
</svg>
